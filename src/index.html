<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="styles.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多国语言编辑器</title>
</head>
<body>

<div id="open-screen">
  <p id="open-screen-msg">尚未选择 translations.xml 文件</p>
  <button id="btn-open-initial" type="button">选择 translations.xml…</button>
  <button id="btn-new-initial" type="button" class="secondary">新建 translations.xml…</button>
  <p class="open-screen-hint">新建会生成一份带 中文/英语 两列和示例条目的全新 translations.xml，并在同目录生成配套的 multilang.h / multilang.c。</p>
</div>

<div id="app-root">
  <header>
    <div class="toolbar">
      <button id="btn-open" type="button">打开…</button>
      <button id="btn-new" type="button" title="新建一份全新的 translations.xml">新建…</button>
      <button id="btn-export-csv" type="button">导出 CSV</button>
      <button id="btn-import-csv" type="button">导入 CSV</button>
      <button id="btn-add-entry" type="button">+ 新增条目</button>
      <button id="btn-add-lang" type="button">+ 新增语言</button>
      <button id="btn-find-replace" type="button">查找替换</button>
      <button id="btn-check-update" type="button" title="检查是否有新版本">检查更新</button>
      <button id="btn-save" type="button" disabled title="Ctrl+S">保存</button>
    </div>
    <div class="right">
      <input type="text" id="filter" placeholder="过滤 key / 任意语言文本…" autocomplete="off" spellcheck="false">
      <span id="status" title=""></span>
    </div>
  </header>

  <div id="banner"></div>

  <div class="table-wrap">
    <table id="grid">
      <thead><tr id="head-row"></tr></thead>
      <tbody id="body"></tbody>
    </table>
    <div class="empty-hint" id="empty" style="display:none">无匹配条目</div>
  </div>

  <footer id="status-bar">
    <span class="meta" id="path-display" title=""></span>
  </footer>
</div>

<div id="update-toast"></div>

<script type="module" src="./main.js"></script>
</body>
</html>
